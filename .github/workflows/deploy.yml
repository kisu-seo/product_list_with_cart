name: Deploy to GitHub Pages

on:
  # main 브랜치에 push될 때마다 자동 배포
  push:
    branches:
      - main
  # GitHub Actions 탭에서 수동 실행 허용
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 의존성 설치
      - name: Install dependencies
        run: npm ci

      # 4. Vite 프로덕션 빌드 (base: '/product_list_with_cart/' 적용됨)
      - name: Build
        run: npm run build

      # 5. dist 폴더 내용을 gh-pages 브랜치에 배포
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
