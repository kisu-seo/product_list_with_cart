name: Deploy to GitHub Pages

on:
  # main 브랜치에 push될 때 자동 배포
  push:
    branches:
      - main
  # GitHub Actions 탭에서 수동 실행 허용
  workflow_dispatch:

# GitHub Pages 배포에 필요한 최소 권한 설정
permissions:
  contents: read   # 소스 코드 읽기
  pages: write     # GitHub Pages에 쓰기
  id-token: write  # OIDC 토큰 발급 (공식 배포 액션 필수)

# 동시에 여러 배포가 실행되지 않도록 제어 (진행 중인 배포는 유지, 대기 중인 것만 취소)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # GitHub Pages 환경으로 지정하여 배포 URL을 자동으로 노출
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 환경 설정
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 의존성 설치 (package-lock.json 기준으로 정확하게 설치)
      - name: Install dependencies
        run: npm ci

      # 4. Vite 프로덕션 빌드 (base: '/product_list_with_cart/' 경로 적용)
      - name: Build
        run: npm run build

      # 5. GitHub Pages 환경 설정
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. 빌드 결과물(dist/)을 Pages 아티팩트로 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 7. GitHub Pages에 직접 배포 (별도 브랜치 생성 없음)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
